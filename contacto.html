<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda — Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1><img src="logopagina.jpg" alt="Logo Tienda Online" style="height: 50px; vertical-align: middle;">
        Tienda Online – Impresión 3D
        </h1>
        <p class="subtitle">Lo queres, lo creamos</p>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="tienda.html">Productos</a>
            <a href="contacto.html" class="active">Contacto</a>
            <span id="cart-counter" style="color: #e74c3c; font-weight: bold; margin-left: 15px;">🛒 Carrito: (0)</span>
        </nav>
    </header>

    <main class="container">
        <h2>Bienvenidos a nuestra tienda</h2>
        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Tu nombre completo">
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="text" id="email" placeholder="ejemplo@correo.com">
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" rows="4" style="width:100%; padding:10px; border-radius:4px; border:1px solid #ccc;" placeholder="¿Qué pieza deseas imprimir?"></textarea>
            </div>
            <button type="submit" class="btn">Enviar Formulario</button>
        </form>
        <p id="formMessage" class="form-message"></p>
    </main>

    <footer>
        <div class="footer-content">
             <p>&copy; 2026 Isabel Aspiroz. Todos los derechos reservados.</p>
               <div class="footer-socials">
                <a href="https://www.instagram.com/3d_sanmiguel/?hl=es" target="_blank" aria-label="Instagram" style="color: #ffffff !important; text-decoration: none; font-weight: bold;">  📸   Instagram</a>
                <a href="https://www.facebook.com/Techpul18/about" target="_blank" aria-label="Facebook" style="color: #ffffff !important; text-decoration: none; font-weight: bold;">  🔵   Facebook</a>
                <a href="https://wa.me/1161454808" target="_blank" aria-label="WhatsApp" style="color: #ffffff !important; text-decoration: none; font-weight: bold;">  🟢   WhatsApp</a>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
